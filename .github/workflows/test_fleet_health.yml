name : Test Fleet and Env Variables

on: 
  workflow_call:  

permissions:
  id-token: write
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::561516790720:role/github-action-deploy-role
          aws-region: us-east-1

      - name: Fleet Health check
        id: health
        run: |
          CMD_ID=$(aws ssm send-command \
            --targets "Key=tag:App,Values=flask" \
            --document-name "AWS-RunShellScript" \
            --parameters '{"commands":[
            "hostname -I",
            "docker --version 2>/dev/null || echo DOCKER NOT INSTALLED",
            "aws --version 2>/dev/null || echo DOCKER NOT INSTALLED",
            "mysql --version 2>/dev/null || echo DOCKER NOT INSTALLED",
            "aws ssm get-parameters-by-path --path /application/banking --with-decryption --region us-east-1"
            ]}' \
            --query 'Command.CommandId' --output text \
            --region us-east-1)
          echo "cmd_id"=$"CMD_ID" >> $GITHUB_OUTPUT

      - name: show results
        run: |
          sleep 20
          aws ssm list-command-invocations \
            --command-id "${{steps.health.outputs.cmd_id}}" --details \
            --region us-east-1 \
            --query 'CommandInvocations[].{Instance:InstanceId,Status:Status,Output:CommandPlugins[0].Output}' \
            --output text
            


          FAILED=$(aws ssm list-command-invocations \
            --command-id "${{steps.health.outputs.cmd_id}}" \
            --details \
            --query "length(CommandInvocations[?Status=='Failed'])" \
            --output text \
            --region us-east-1
            )

          [ "$FAILED" -gt 0 ] && \
          echo "::error::Health Check Failed on $FAILED instances" && \
          exit 1

          echo "All Instance Healthy."